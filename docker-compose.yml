services:
  backend:
    build:
      context: ./backend
      args:
        HOME: /tmp
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/chat.db
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_ORIGIN=${WEBAUTHN_RP_ORIGIN:-http://localhost:4200}
    volumes:
      - chat-data:/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        HOME: /tmp
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chat-data:
