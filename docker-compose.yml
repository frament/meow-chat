services:
  backend:
    build:
      context: ./backend
      args:
        HOME: /tmp
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/chat.db
    volumes:
      - chat-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        HOME: /tmp
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chat-data:
