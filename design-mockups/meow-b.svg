<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Силуэт кота как речевой пузырь с акцентом: морда + точка-сообщение -->
  <defs>
    <linearGradient id="m2-g" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Голова кота -->
  <g transform="translate(50,44)">
    <ellipse cx="0" cy="0" rx="28" ry="24" fill="url(#m2-g)"/>
    <!-- Уши -->
    <path d="M-18 -16 L-24 -34 L-8 -22Z" fill="url(#m2-g)"/>
    <path d="M18 -16 L24 -34 L8 -22Z" fill="url(#m2-g)"/>
    <!-- Внутренние уши -->
    <path d="M-17 -18 L-21 -29 L-11 -21Z" fill="#c084fc"/>
    <path d="M17 -18 L21 -29 L11 -21Z" fill="#c084fc"/>
    <!-- Белая маска -->
    <ellipse cx="0" cy="6" rx="18" ry="14" fill="#fff"/>
    <!-- Глаза -->
    <ellipse cx="-10" cy="-2" rx="3.5" ry="4.5" fill="#fff"/>
    <ellipse cx="10" cy="-2" rx="3.5" ry="4.5" fill="#fff"/>
    <circle cx="-9" cy="-3" r="2.5" fill="#1e293b"/>
    <circle cx="11" cy="-3" r="2.5" fill="#1e293b"/>
    <circle cx="-8" cy="-4" r="1" fill="#fff"/>
    <circle cx="12" cy="-4" r="1" fill="#fff"/>
    <!-- Носик -->
    <path d="M-3 6 L0 9 L3 6Z" fill="#f472b6"/>
    <!-- Ротик -->
    <path d="M-6 12 Q0 18 6 12" stroke="#1e293b" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Маленький речевой пузырь с точкой (сообщение) -->
  <g transform="translate(64,18)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#fbbf24"/>
    <polygon points="-6,7 0,14 4,6" fill="#fbbf24"/>
    <circle cx="0" cy="0" r="2.5" fill="#1e293b"/>
  </g>
</svg>
